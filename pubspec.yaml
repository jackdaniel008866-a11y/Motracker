name: motracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  sqflite: ^2.3.2
  sqflite_common_ffi_web: ^0.4.0
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  
  # API & Auth
  http: ^1.2.1
  google_sign_in: ^6.2.1
  
  # UI & Utilities
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Export
  csv: ^6.0.0
  share_plus: ^7.2.1
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
